[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "microphone=(), camera=(), geolocation=()"
    X-DNS-Prefetch-Control = "on"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.google.com/recaptcha/ https://www.gstatic.com/recaptcha/ https://www.google-analytics.com https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; frame-src https://www.google.com/recaptcha/; img-src 'self' data: https:; connect-src 'self' https://www.google-analytics.com; object-src 'none'; base-uri 'self'; form-action 'self'"

[[headers]]
  for = "/.well-known/microsoft-identity-association.json"
  [headers.values]
    Content-Security-Policy = ""
    Permissions-Policy = ""
    X-Frame-Options = ""
    X-XSS-Protection = ""
    X-DNS-Prefetch-Control = ""
    Referrer-Policy = ""
    Cache-Control = "no-cache"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/img/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[redirects]]
  from = "https://keen-montalcini-f453b2.netlify.com/*"
  to = "https://www.doneops.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/casestudies/*"
  to = "/case-studies/:splat"
  status = 301
  force = true
